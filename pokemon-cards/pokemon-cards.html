<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  @page {
    size: letter portrait;
    margin: 0.15in;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: white;
    padding: 0.15in;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 2.55in);
    grid-template-rows: repeat(3, 3.55in);
    column-gap: 0;
    row-gap: 0;
  }

  .card {
    height: 3.55in;
    border: 4px solid #CC1111;
    border-radius: 14px;
    overflow: hidden;
    background: white;
    display: flex;
    flex-direction: column;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
    position: relative;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1.5px solid rgba(255,170,170,0.55);
    border-radius: 10px;
    pointer-events: none;
    z-index: 10;
  }

  .header {
    background: linear-gradient(to bottom, #8C62C0, #5E3A9A);
    color: white;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    padding: 7px 4px 8px;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .illustration {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    background: #F0EAFF;
  }

  .illustration img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .types {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 6px 8px;
    background: linear-gradient(to bottom, #F5F0FF, #EBE4FF);
    border-top: 1.5px solid #C8B8F0;
    flex-shrink: 0;
  }

  .type-badge {
    color: white;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .description {
    background: linear-gradient(to bottom, #F5F0FF, #EBE4FF);
    border-top: 1px solid #DDD0F8;
    padding: 6px 8px 8px;
    flex-shrink: 0;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
    font-size: 10.5px;
    color: #333344;
    text-align: center;
    line-height: 1.7;
  }

  .page {
    page-break-after: always;
    break-after: page;
  }

  .page + .page {
    margin-top: 0.15in;
  }
</style>
